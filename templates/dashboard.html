<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elderly Home Monitoring - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Patient Monitoring</h1>
                <p>RSSI-Based Localisation &mdash; IoT Group 26</p>
            </div>
        </header>

        <div class="main-content">
            <!-- 3D Topology Visualization -->
            <div class="visualization-panel">
                <div class="panel-header">
                    <h2>3D Facility Topology</h2>
                    <div class="controls">
                        <button id="resetView" class="btn btn-secondary">Reset View</button>
                        <button id="toggleDistances" class="btn btn-secondary">Show Distances</button>
                        <button id="refreshData" class="btn btn-primary">Refresh</button>
                    </div>
                </div>
                <div id="canvas-container"></div>
                <div class="legend">
                    <div class="legend-item">
                        <span class="color-box" style="background: #ff6b6b;"></span>
                        <span>Patient Devices</span>
                    </div>
                    <div class="legend-item">
                        <span class="color-box" style="background: #4ecdc4;"></span>
                        <span>Stationary Nodes</span>
                    </div>
                    <div class="legend-item">
                        <span class="color-box" style="background: #ffe66d;"></span>
                        <span>Gateway</span>
                    </div>
                </div>
            </div>

            <!-- Device List Panel -->
            <div class="device-panel">
                <div class="panel-header">
                    <h2>Patient Devices</h2>
                    <div class="panel-controls">
                        <button id="updateAllLocationsBtn" class="btn btn-primary">Update All Locations</button>
                        <button id="jobsMenuBtn" class="btn btn-secondary">Jobs</button>
                        <span id="deviceCount" class="badge badge-secondary">0</span>
                    </div>
                </div>
                <div id="deviceList" class="device-list">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Device Detail Modal -->
        <div id="deviceModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle"></h2>
                <div id="modalBody">
                    <!-- Populated by JavaScript -->
                </div>
                <div class="modal-actions">
                    <button id="locateBtn" class="btn btn-primary">Update Location</button>
                    <button id="requestImageBtn" class="btn btn-success">Request Image</button>
                    <button id="viewImageBtn" class="btn btn-info" style="display: none;">View Image</button>
                </div>
            </div>
        </div>

        <!-- Live Image Modal -->
        <div id="liveImageModal" class="modal">
            <div class="modal-content live-image-modal-content">
                <span id="liveImageClose" class="live-image-close">&times;</span>
                <h2 id="liveImageTitle">Incoming Image</h2>
                <div id="liveImageWaiting" class="live-image-waiting">
                    <div class="spinner"></div>
                    <p>Waiting for image from Wi-Fi relay...</p>
                </div>
                <div id="liveImageContent" style="display:none;">
                    <img id="liveImageElement" src="" alt="Live incoming image">
                    <div class="image-metadata">
                        <p><strong>Captured:</strong> <span id="liveImageTimestamp"></span></p>
                        <p><strong>Size:</strong> <span id="liveImageSize"></span></p>
                        <p><strong>Resolution:</strong> <span id="liveImageResolution"></span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="toast"></div>
        
        <!-- Job Console Panel -->
        <div id="jobConsole" class="job-console" style="display:none;">
            <div class="job-console-header">
                <h3>Update-All Job Console</h3>
                <button id="closeJobConsole" class="btn btn-secondary">Close</button>
            </div>
            <div id="jobConsoleBody" class="job-console-body">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/topology3d.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js', v='20260405-1') }}"></script>
</body>
</html>
